<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>KBO League Schedule</title>
    
    <!-- 🔥 홈 화면 추가 시 적용될 앱 아이콘 설정 🔥 -->
    <link rel="icon" href="logo.png">
    <link rel="apple-touch-icon" href="logo.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- 🔥 파이어베이스 SDK (Firebase v10 Compat) 🔥 -->
    <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore-compat.js"></script>

    <style>
        @font-face {
            font-family: 'KBO-Dia-Gothic';
            src: url('https://fastly.jsdelivr.net/gh/projectnoonnu/noonfonts_2304-2@1.0/KBO-Dia-Gothic_light.woff') format('woff');
            font-weight: 300;
            font-style: normal;
        }
        @font-face {
            font-family: 'KBO-Dia-Gothic';
            src: url('https://fastly.jsdelivr.net/gh/projectnoonnu/noonfonts_2304-2@1.0/KBO-Dia-Gothic_medium.woff') format('woff');
            font-weight: 500;
            font-style: normal;
        }
        @font-face {
            font-family: 'KBO-Dia-Gothic';
            src: url('https://fastly.jsdelivr.net/gh/projectnoonnu/noonfonts_2304-2@1.0/KBO-Dia-Gothic_bold.woff') format('woff');
            font-weight: 700;
            font-style: normal;
        }

        /* 🔥 구단별 다이내믹 테마 색상 🔥 */
        :root {
            --point-color: #FFFFFF;
            --point-bg: rgba(255, 255, 255, 0.15);
            --app-bg: #000000;
        }
        body[data-theme="KIA"] { --point-color: #EA0029; --point-bg: rgba(234, 0, 41, 0.15); --app-bg: #140003; }
        body[data-theme="삼성"] { --point-color: #074CA1; --point-bg: rgba(7, 76, 161, 0.15); --app-bg: #000514; }
        body[data-theme="all"] { --point-color: #FFFFFF; --point-bg: rgba(255, 255, 255, 0.15); --app-bg: #000000; }

        /* 🔥 전체 탭(화이트)일 때 버튼 텍스트가 안보이는 현상 방지 (검은색 텍스트로 반전) 🔥 */
        body[data-theme="all"] .bg-point.text-white,
        body[data-theme="all"] #bottom-nav .text-white { color: #000000 !important; }

        .app-bg { background-color: var(--app-bg) !important; transition: background-color 0.5s cubic-bezier(0.4, 0, 0.2, 1); }
        .text-point { color: var(--point-color) !important; transition: color 0.5s ease; }
        .bg-point { background-color: var(--point-color) !important; transition: background-color 0.5s ease; }
        .bg-point-sub { background-color: var(--point-bg) !important; transition: background-color 0.5s ease; }

        body { 
            font-family: 'KBO-Dia-Gothic', sans-serif;
            -webkit-tap-highlight-color: transparent;
            overscroll-behavior-y: none;
            touch-action: pan-y;
        }

        /* 🔥 바텀 시트 배경 (투명도 완벽 제거 및 깔끔한 솔리드 컬러) 🔥 */
        .toss-card {
            background: #1C1C1E; /* 반투명 rgba 대신 완전한 불투명 컬러 적용 */
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            box-shadow: 0 -4px 32px rgba(0, 0, 0, 0.5); /* 팝업이 위로 올라오니 그림자도 위쪽으로 자연스럽게 수정 */
        }

        .list-card { background: #1C1C1E; border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 20px; transition: transform 0.1s; }
        .list-card:active { transform: scale(0.97); background: #2C2C2E; }

        .pt-safe { padding-top: max(20px, env(safe-area-inset-top)); }
        .pt-main { padding-top: calc(max(20px, env(safe-area-inset-top)) + 70px); }

        #nav-indicator { will-change: transform, width; }
        .nav-transition { transition: transform 0.3s cubic-bezier(0.2, 0.8, 0.2, 1), width 0.3s cubic-bezier(0.2, 0.8, 0.2, 1); }
        
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }

        /* 🔥 상단 모션 속도 및 곡선을 전체 버튼(0.7s)과 완벽하게 통일 🔥 */
        .ctrl-item { transition: max-width 0.7s cubic-bezier(0.2, 0.8, 0.2, 1), padding 0.7s cubic-bezier(0.2, 0.8, 0.2, 1), opacity 0.7s ease; overflow: hidden; white-space: nowrap; width: max-content; justify-self: end; }
        .ctrl-show { max-width: 200px; opacity: 1; padding-left: 16px; padding-right: 16px; }
        .ctrl-hide { max-width: 0px; opacity: 0; padding-left: 0px; padding-right: 0px; pointer-events: none; }

        /* 🔥 촐싹대는 애니메이션 빼고 스르륵(ease-out) 부드럽게 올라오도록 수정 🔥 */
        #bottom-sheet { transition: transform 0.3s cubic-bezier(0.2, 0.8, 0.2, 1), opacity 0.3s; transform: translate(-50%, 120%); opacity: 0; }
        #bottom-sheet.show { transform: translate(-50%, 0); opacity: 1; }

        .calendar-day { aspect-ratio: 1 / 1.2; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; padding-top: 14px; border-radius: 12px; transition: all 0.2s; }
        .calendar-day:active { transform: scale(0.92); }
        .has-match { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); }
        .today { background: var(--point-bg) !important; border: 1px solid var(--point-color) !important; }

        /* 🔥 실시간 펄스 애니메이션 (진행 중인 경기 표시용) 🔥 */
        @keyframes pulse-ring {
            0% { box-shadow: 0 0 0 0 rgba(234, 0, 41, 0.7); }
            70% { box-shadow: 0 0 0 6px rgba(234, 0, 41, 0); }
            100% { box-shadow: 0 0 0 0 rgba(234, 0, 41, 0); }
        }
        .live-badge { animation: pulse-ring 2s infinite; }

        /* 🔥 응원가 탭 팀별 표시 로직 🔥 */
        .cheer-team { display: none; flex-direction: column; gap: 16px; }
        body[data-theme="KIA"] .cheer-KIA { display: flex; }
        body[data-theme="삼성"] .cheer-삼성 { display: flex; }

        /* 🔥 전체 버튼 숨김 애니메이션용 🔥 */
        .btn-collapse {
            max-width: 0px !important;
            padding-left: 0px !important;
            padding-right: 0px !important;
            opacity: 0 !important;
            pointer-events: none !important;
            margin-right: -4px !important; /* 버튼 사이의 간격(gap) 완벽 상쇄 */
            border-width: 0px !important;
        }
        .team-btn-anim {
            /* 🔥 모션 속도를 0.4초에서 0.7초로 늘려서 훨씬 더 부드럽고 여유롭게 스르륵 닫히도록 수정 🔥 */
            transition: all 0.7s cubic-bezier(0.2, 0.8, 0.2, 1);
            overflow: hidden;
            max-width: 60px;
            white-space: nowrap;
        }
    </style>
</head>
<body class="w-full h-[100dvh] bg-[#0a0a0a] flex justify-center items-center overflow-hidden" data-theme="all">

    <!-- 🔥 MP3 재생용 오디오 태그 (유튜브 대체) 🔥 -->
    <audio id="audio-player" style="display:none;" preload="auto" autoplay playsinline></audio>

    <div id="mobile-wrapper" class="w-full h-full max-w-[430px] relative z-10 flex flex-col overflow-hidden sm:border-x border-white/10 sm:shadow-2xl app-bg">

        <!-- 헤더 영역 -->
        <header class="absolute top-0 left-0 right-0 pt-safe px-4 pb-2 z-20 app-bg">
            <div class="mt-2 flex items-center gap-2 w-full pb-1">
                <div class="flex items-center flex-1 bg-[#151515] rounded-full px-4 py-2 shadow-lg border border-white/5 min-h-[36px]">
                    <div class="flex items-baseline gap-1.5 w-full overflow-hidden">
                        <h1 id="di-main-text" class="text-[13px] font-extrabold text-white flex items-center tracking-tight">KBO 리그<span class="w-1 h-1 bg-point rounded-full ml-1 mb-0.5"></span></h1>
                        <span class="text-[11px] text-gray-400 font-medium whitespace-nowrap">2026시즌</span>
                    </div>
                </div>
                <!-- 🔥 컨트롤 박스 전체(wrapper)의 애니메이션 시간도 duration-700 (0.7초)로 완벽 통일 🔥 -->
                <div id="ctrl-wrapper" class="grid bg-[#151515] rounded-full shadow-lg border border-white/5 h-[36px] shrink-0 overflow-hidden relative transition-all duration-700 origin-right">
                    <div id="ctrl-team" class="ctrl-item ctrl-show flex items-center justify-center gap-1 h-full" style="grid-area: 1/1;">
                        <button onclick="setTeamFilter('all')" id="btn-team-all" class="team-btn-anim px-3.5 py-1.5 text-[11px] font-bold rounded-full bg-point text-white shadow-sm active:scale-95 cursor-pointer shrink-0 relative z-50 pointer-events-auto">전체</button>
                        <button onclick="setTeamFilter('KIA')" id="btn-team-KIA" class="team-btn-anim px-3.5 py-1.5 text-[11px] font-medium rounded-full text-gray-400 active:scale-95 cursor-pointer shrink-0 relative z-50 pointer-events-auto">KIA</button>
                        <button onclick="setTeamFilter('삼성')" id="btn-team-삼성" class="team-btn-anim px-3.5 py-1.5 text-[11px] font-medium rounded-full text-gray-400 active:scale-95 cursor-pointer shrink-0 relative z-50 pointer-events-auto">삼성</button>
                    </div>
                    <div id="ctrl-sort" class="ctrl-item ctrl-hide flex items-center justify-center gap-1 h-full" style="grid-area: 1/1;">
                        <span id="sort-text" class="text-[12px] font-bold text-gray-400">날짜순</span>
                    </div>
                </div>
            </div>
        </header>

        <!-- 1. 달력 화면 -->
        <main id="calendar-screen" class="flex flex-1 min-h-0 relative w-full flex-col app-bg overflow-y-auto scrollbar-hide pb-24">
            <div class="px-5 pt-main flex-1 flex flex-col">
                <div class="flex justify-center items-center mb-4">
                    <div class="flex items-center gap-4">
                        <button onclick="navigateCalendar(-1)" class="w-8 h-8 flex text-gray-400 hover:text-white rounded-full bg-white/5 border border-white/10 items-center justify-center"><i class="fa-solid fa-chevron-left text-sm"></i></button>
                        <h2 id="calendar-title" class="text-2xl font-bold text-white text-center min-w-[100px]">2026년 3월</h2>
                        <button onclick="navigateCalendar(1)" class="w-8 h-8 flex text-gray-400 hover:text-white rounded-full bg-white/5 border border-white/10 items-center justify-center"><i class="fa-solid fa-chevron-right text-sm"></i></button>
                    </div>
                </div>
                
                <!-- 🔥 상단 배너 영역 (좌우 꽉 차게 Full-Bleed 변경) 🔥 -->
                <div class="relative mb-6 shrink-0 -mx-5">
                    <div id="banner-carousel" class="flex overflow-x-auto snap-x snap-mandatory scrollbar-hide pb-1" style="touch-action: pan-x pan-y;"></div>
                    <div class="absolute -bottom-6 left-0 w-full flex justify-center items-center z-10 pointer-events-none">
                        <div class="relative flex items-center justify-center gap-2 pointer-events-auto">
                            <div id="banner-dots-container" class="flex items-center gap-1.5"></div>
                            <button onclick="toggleBannerPlay()" id="btn-banner-play" class="flex items-center justify-center text-gray-500 hover:text-white transition-colors w-4 h-4 hidden">
                                <i class="fa-solid fa-pause text-[10px]"></i>
                            </button>
                        </div>
                    </div>
                </div>

                <div class="flex justify-end mb-3">
                    <div class="flex gap-1 bg-white/5 p-1 rounded-full border border-white/10 w-fit shrink-0">
                        <button onclick="setViewMode('month')" id="btn-mode-month" class="px-3 py-1 text-xs font-bold rounded-full bg-point text-white transition-all">월간</button>
                        <button onclick="setViewMode('week')" id="btn-mode-week" class="px-3 py-1 text-xs font-medium rounded-full text-gray-400 hover:text-white transition-all">주간</button>
                    </div>
                </div>

                <div id="week-days-header" class="grid grid-cols-7 gap-2 text-center mb-3">
                    <div class="text-xs font-bold text-red-400">일</div>
                    <div class="text-xs font-bold text-gray-400">월</div>
                    <div class="text-xs font-bold text-gray-400">화</div>
                    <div class="text-xs font-bold text-gray-400">수</div>
                    <div class="text-xs font-bold text-gray-400">목</div>
                    <div class="text-xs font-bold text-gray-400">금</div>
                    <div class="text-xs font-bold text-blue-400">토</div>
                </div>

                <div id="calendar-grid" class="grid grid-cols-7 gap-2"></div>
            </div>

            <!-- 달력 바텀 시트 (일정 상세 요약) -->
            <div id="bottom-sheet" class="absolute bottom-24 left-1/2 w-[92%] z-30 toss-card p-5 cursor-default flex flex-col max-h-[50vh]">
                <div class="flex justify-between items-center mb-4">
                    <div class="flex items-center gap-2">
                        <h3 id="sheet-date-title" class="text-lg font-bold text-white">일정</h3>
                        <span id="sheet-match-count" class="text-[10px] font-bold text-point bg-point-sub px-2 py-0.5 rounded-full"></span>
                    </div>
                    <button onclick="closeBottomSheet()" class="w-8 h-8 rounded-full bg-white/10 flex items-center justify-center text-gray-400 hover:text-white"><i class="fa-solid fa-xmark"></i></button>
                </div>
                <div id="sheet-matches-container" class="flex-1 overflow-y-auto scrollbar-hide space-y-3 pb-2"></div>
            </div>
        </main>

        <!-- 3. 순위 화면 -->
        <main id="ranking-screen" class="hidden flex-1 min-h-0 relative w-full flex-col app-bg overflow-y-auto scrollbar-hide pb-24">
            <div class="w-full pt-main pb-10" id="ranking-container"></div>
        </main>

        <!-- 4. 응원가 화면 (곡 목록 선택 UI) -->
        <main id="cheer-screen" class="hidden flex-1 min-h-0 relative w-full flex-col app-bg overflow-y-auto scrollbar-hide">
            <div class="w-full pt-main pb-[220px] flex flex-col items-center px-5">
                
                <!-- 🔥 KIA 응원가 목록 완벽 복구 🔥 -->
                <div class="cheer-team cheer-KIA w-full flex-col gap-2 mt-2">
                    <div class="flex items-center justify-between mb-1.5 px-1 w-full">
                        <div class="flex items-center gap-2.5">
                            <img src="https://i.namu.wiki/i/W0yZrMENss9Jf2ntFpyly0YSRbO9gPWz87BrCFyqwdnRLm6PMGen9Qwbounrk1sbOCMXHBys_TI9qKB2tUhfth8e563qvChkAxelE9WgwpwJgyHKzOZSD-u2AAtoJBv77pAth-0NNzq4XwGQ0rLfOQ.svg" class="w-7 h-7 object-contain drop-shadow-md">
                            <h2 class="text-lg font-extrabold text-white tracking-tight">KIA 응원가</h2>
                        </div>
                        <button onclick="playActiveTabSongs('kia')" class="bg-white/10 hover:bg-white/20 border border-white/10 text-white text-[11px] font-bold py-1.5 px-3 rounded-full flex items-center gap-1.5 transition-all active:scale-95 shadow-sm"><i class="fa-solid fa-play text-[10px]"></i>전체 재생</button>
                    </div>

                    <!-- KIA 탭 메뉴 -->
                    <div class="flex bg-white/5 p-1 rounded-full mb-1">
                        <button onclick="switchCheerTab('kia', 'team')" id="btn-cheer-kia-team" class="flex-1 py-1.5 text-[11px] font-bold bg-[#EA0029] text-white rounded-full transition-all shadow-sm">구단</button>
                        <button onclick="switchCheerTab('kia', 'player')" id="btn-cheer-kia-player" class="flex-1 py-1.5 text-[11px] font-medium text-gray-400 hover:text-white rounded-full transition-all">선수</button>
                        <button onclick="switchCheerTab('kia', 'lineup')" id="btn-cheer-kia-lineup" class="flex-1 py-1.5 text-[11px] font-medium text-gray-400 hover:text-white rounded-full transition-all">라인업</button>
                        <button onclick="switchCheerTab('kia', 'hitout')" id="btn-cheer-kia-hitout" class="flex-1 py-1.5 text-[11px] font-medium text-gray-400 hover:text-white rounded-full transition-all">안타/아웃</button>
                        <button onclick="switchCheerTab('kia', 'entrance')" id="btn-cheer-kia-entrance" class="flex-1 py-1.5 text-[11px] font-medium text-gray-400 hover:text-white rounded-full transition-all">등장곡</button>
                    </div>
                    
                    <!-- KIA 컨텐츠 -->
                    <div id="content-cheer-kia-team" class="flex flex-col gap-2"></div>
                    <div id="content-cheer-kia-player" class="hidden flex-col gap-2"></div>
                    <div id="content-cheer-kia-lineup" class="hidden flex-col gap-2">
                        <div class="text-center text-xs text-gray-500 py-6">노래를 추가해 주세요.</div>
                    </div>
                    <div id="content-cheer-kia-hitout" class="hidden flex-col gap-2">
                        <div class="text-center text-xs text-gray-500 py-6">노래를 추가해 주세요.</div>
                    </div>
                    <div id="content-cheer-kia-entrance" class="hidden flex-col gap-2">
                        <div class="text-center text-xs text-gray-500 py-6">노래를 추가해 주세요.</div>
                    </div>
                </div>

                <!-- 🔥 삼성 응원가 목록 완벽 복구 🔥 -->
                <div class="cheer-team cheer-삼성 w-full flex-col gap-2 mt-2">
                    <div class="flex items-center justify-between mb-1.5 px-1 w-full">
                        <div class="flex items-center gap-2.5">
                            <img src="https://i.namu.wiki/i/j_0SPzwNZ9_862jjVwlK4NwjVzMUjubABTVYul8Fbr46wE_lj7z7Sfroas9et17E9DGNpIX-NHmn0ZtUUCT-NHkID9yEXgZjhoEQoTS2dHU2k6bbDpJ8GE_32hM61lBccdsz9RQKc2iB_yaQqB2k1Q.svg" class="w-7 h-7 object-contain drop-shadow-md">
                            <h2 class="text-lg font-extrabold text-white tracking-tight">삼성 응원가</h2>
                        </div>
                        <button onclick="playActiveTabSongs('samsung')" class="bg-white/10 hover:bg-white/20 border border-white/10 text-white text-[11px] font-bold py-1.5 px-3 rounded-full flex items-center gap-1.5 transition-all active:scale-95 shadow-sm"><i class="fa-solid fa-play text-[10px]"></i>전체 재생</button>
                    </div>

                    <!-- 삼성 탭 메뉴 -->
                    <div class="flex bg-white/5 p-1 rounded-full mb-1">
                        <button onclick="switchCheerTab('samsung', 'team')" id="btn-cheer-samsung-team" class="flex-1 py-1.5 text-[11px] font-bold bg-[#074CA1] text-white rounded-full transition-all shadow-sm">구단</button>
                        <button onclick="switchCheerTab('samsung', 'player')" id="btn-cheer-samsung-player" class="flex-1 py-1.5 text-[11px] font-medium text-gray-400 hover:text-white rounded-full transition-all">선수</button>
                        <button onclick="switchCheerTab('samsung', 'lineup')" id="btn-cheer-samsung-lineup" class="flex-1 py-1.5 text-[11px] font-medium text-gray-400 hover:text-white rounded-full transition-all">라인업</button>
                        <button onclick="switchCheerTab('samsung', 'hitout')" id="btn-cheer-samsung-hitout" class="flex-1 py-1.5 text-[11px] font-medium text-gray-400 hover:text-white rounded-full transition-all">안타/아웃</button>
                        <button onclick="switchCheerTab('samsung', 'entrance')" id="btn-cheer-samsung-entrance" class="flex-1 py-1.5 text-[11px] font-medium text-gray-400 hover:text-white rounded-full transition-all">등장곡</button>
                    </div>
                    
                    <!-- 삼성 컨텐츠 -->
                    <div id="content-cheer-samsung-team" class="flex flex-col gap-2"></div>
                    <div id="content-cheer-samsung-player" class="hidden flex-col gap-2"></div>
                    <div id="content-cheer-samsung-lineup" class="hidden flex-col gap-2">
                        <div class="text-center text-xs text-gray-500 py-6">노래를 추가해 주세요.</div>
                    </div>
                    <div id="content-cheer-samsung-hitout" class="hidden flex-col gap-2">
                        <div class="text-center text-xs text-gray-500 py-6">노래를 추가해 주세요.</div>
                    </div>
                    <div id="content-cheer-samsung-entrance" class="hidden flex-col gap-2">
                        <div class="text-center text-xs text-gray-500 py-6">노래를 추가해 주세요.</div>
                    </div>
                </div>

            </div>
        </main>

        <!-- 실시간 매치 센터 (라인업 & 실시간 점수 상세 팝업) -->
        <div id="lineup-popup" class="fixed inset-0 z-[60] hidden flex-col justify-end pointer-events-none">
            <div id="lineup-popup-bg" class="absolute inset-0 bg-black/60 backdrop-blur-sm opacity-0 transition-opacity duration-300 pointer-events-none" onclick="closeLineupPopup()"></div>

        // 🔥 서버 통신 및 실시간 점수 리스너 등록 🔥
        async function syncWithFirestore() {
            try {
                const matchesSnap = await db.collection("matches").get();

                if (matchesSnap.empty) {
                    scheduleData = [...initialScheduleData];
                    const batch = db.batch();
                    initialScheduleData.forEach(match => batch.set(db.collection("matches").doc(match.id.toString()), match));
                    await batch.commit();
                } else {
                    scheduleData = matchesSnap.docs.map(doc => doc.data());
                    if (scheduleData.length < initialScheduleData.length) {
                        const batch = db.batch();
                        initialScheduleData.forEach(match => batch.set(db.collection("matches").doc(match.id.toString()), match));
                        await batch.commit();
                        scheduleData = [...initialScheduleData];
                    }
                    scheduleData.sort((a, b) => {
                        if (a.date === b.date) return (a.time || "00:00").localeCompare(b.time || "00:00");
                        return a.date.localeCompare(b.date);
                    });
                }

                db.collection("rankings").onSnapshot((snapshot) => {
                    if (snapshot.empty) {
                        rankingData = [...initialRankingData];
                    } else {
                        rankingData = snapshot.docs.map(doc => doc.data()).sort((a, b) => {
                            if (a.rank === '-') return 1;
                            if (b.rank === '-') return -1;
                            return parseInt(a.rank) - parseInt(b.rank);
                        });
                    }
                    if (currentTabIndex === 1) renderRanking();
                });

                db.collection("lineups").onSnapshot((snapshot) => {
                    snapshot.forEach(doc => {
                        liveDataStore[doc.id] = doc.data(); 
                    });
                    
                    if (currentTabIndex === 0) renderCalendar();
                    
                    if (currentPopupMatchId) {
                        renderPopupContent(currentPopupMatchId);
                    }
                    
                    renderBanners(); 
                    renderLineupCheerSongs(); // 🔥 라인업 응원가 자동 생성 호출
                });

            } catch (error) {
                console.error("파이어베이스 통신 에러:", error);
                scheduleData = [...initialScheduleData]; 
            }
        }

        function renderCalendar() {
            const grid = document.getElementById('calendar-grid');
            if(!grid) return; grid.innerHTML = '';
            
            const year = currentDate.getFullYear(); const month = currentDate.getMonth();
            if (viewMode === 'month') {
                document.getElementById('week-days-header').classList.remove('hidden');
                grid.className = 'grid grid-cols-7 gap-2';
                document.getElementById('calendar-title').innerText = `${year}년 ${month + 1}월`;
                const firstDay = new Date(year, month, 1).getDay(); 
                const daysInMonth = new Date(year, month + 1, 0).getDate();
                for (let i = 0; i < firstDay; i++) grid.innerHTML += `<div class="calendar-day opacity-0 pointer-events-none"></div>`;
                
                for (let i = 1; i <= daysInMonth; i++) {
                    const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(i).padStart(2, '0')}`;
                    let matchesToday = scheduleData.filter(m => m.date === dateStr && (selectedTeam === 'all' || m.team1 === selectedTeam || m.team2 === selectedTeam));
                    let isToday = (dateStr === todayStr);
                    
                    let dotsHtml = '';
                    let topIconHtml = '';
                    
                    if (matchesToday.length > 0) {
                        if (selectedTeam === 'all') {
                            dotsHtml = `
                                <div class="flex justify-center items-center gap-1 mt-auto mb-1.5 bg-white/10 px-2 py-0.5 rounded-full border border-white/10 shadow-sm">
                                    <i class="fa-solid fa-baseball text-gray-300 text-[9px]"></i>
                                    <span class="text-[10px] font-bold text-white">+${matchesToday.length}</span>
                                </div>`;
                        } else {
                            let dots = matchesToday.map(match => {
                                let displayTeam = match.team1 === selectedTeam ? match.team2 : match.team1;
                                let isHome = match.team2 === selectedTeam;
                                let logo = teamLogos[displayTeam];
                                let logoHtml = logo ? `<img src="${logo}" class="w-5 h-5 object-contain">` : `<div class="w-1.5 h-1.5 rounded-full ${teamColors[displayTeam] || 'bg-gray-500'}"></div>`;
                                if (isHome) topIconHtml = `<i class="fa-solid fa-house text-point text-[10px] absolute top-1.5 left-1/2 -translate-x-1/2"></i>`;
                                return logoHtml;
                            }).join('');
                            dotsHtml = `<div class="flex justify-center gap-0.5 items-center mt-auto mb-1.5">${dots}</div>`;
                        }
                    }

                    grid.innerHTML += `
                        <div class="calendar-day cursor-pointer relative ${matchesToday.length ? 'has-match' : ''} ${isToday ? 'today' : ''}" onclick="openDateSheet('${dateStr}')">
                            ${topIconHtml}
                            <span class="text-[13px] relative z-10 ${isToday?'text-point font-extrabold':(matchesToday.length?'text-white font-bold':'text-gray-400')}">${i}</span>
                            ${dotsHtml}
                        </div>`;
                }
            } else {
                document.getElementById('week-days-header').classList.add('hidden');
                grid.className = 'flex flex-col gap-6 pb-4 w-full col-span-7';

                let startOfWeek = new Date(currentDate);
                let currentDayOfWeek = (currentDate.getDay() + 6) % 7; // 🔥 일요일을 주말(끝)로 보내고 월요일을 한 주의 시작(0)으로 계산
                startOfWeek.setDate(currentDate.getDate() - currentDayOfWeek);

                let thursday = new Date(startOfWeek);
                thursday.setDate(thursday.getDate() + 3); // 🔥 월요일 기준 +3일 = 목요일 (주차 계산용)

                let firstDayOfMonthObj = new Date(thursday.getFullYear(), thursday.getMonth(), 1);
                let firstThursday = new Date(firstDayOfMonthObj);
                firstThursday.setDate(firstDayOfMonthObj.getDate() + 3 - (firstDayOfMonthObj.getDay() + 6) % 7);
                if (firstThursday.getMonth() !== thursday.getMonth()) firstThursday.setDate(firstThursday.getDate() + 7);
                let weekNum = Math.round((thursday - firstThursday) / 86400000 / 7) + 1;

                document.getElementById('calendar-title').innerText = `${thursday.getFullYear()}년 ${thursday.getMonth() + 1}월 ${weekNum}주차`;

                let weekDays = [];
                for (let i = 0; i < 7; i++) {
                    let d = new Date(startOfWeek);
                    d.setDate(d.getDate() + i);
                    const y = d.getFullYear();
                    const m = String(d.getMonth() + 1).padStart(2, '0');
                    const dayStr = String(d.getDate()).padStart(2, '0');
                    const dateStr = `${y}-${m}-${dayStr}`;

                    let matchesToday = scheduleData.filter(match => match.date === dateStr && (selectedTeam === 'all' || match.team1 === selectedTeam || match.team2 === selectedTeam));
                    weekDays.push({ d, dateStr, matches: matchesToday });
                }

                let idx = 0;
                while (idx < 7) {
                    let currentDay = weekDays[idx];
                    if (currentDay.matches.length > 0) {
                        let matchesHtml = `<div class="space-y-3">` + currentDay.matches.map(match => {
                            let isHome = selectedTeam !== 'all' && match.team2 === selectedTeam;
                            let logo1 = teamLogos[match.team1] ? `<img src="${teamLogos[match.team1]}" class="w-6 h-6 object-contain">` : `<div class="w-3 h-3 rounded-full ${teamColors[match.team1] || 'bg-gray-500'}"></div>`;
                            let logo2 = teamLogos[match.team2] ? `<img src="${teamLogos[match.team2]}" class="w-6 h-6 object-contain">` : `<div class="w-3 h-3 rounded-full ${teamColors[match.team2] || 'bg-gray-500'}"></div>`;

                            const live = liveDataStore[match.id];
                            let statusHtml = `<span class="text-[10px] text-gray-400 font-bold"><i class="fa-solid fa-clock mr-1"></i>${match.time} · ${isHome ? `<i class="fa-solid fa-house text-point mx-0.5"></i>` : ''}${match.stadium}</span>`;
                            let scoreHtml = `<span class="text-xs text-gray-500">vs</span>`;

                            if (live && live.gameStatus !== '경기전') {
                                let badgeClass = live.gameStatus === '종료' ? 'bg-gray-600' : 'bg-red-600 live-badge';
                                let displayStatus = (live.gameStatus === '경기중' && live.inning) ? live.inning : live.gameStatus;
                                statusHtml = `<div class="flex items-center gap-1.5"><span class="${badgeClass} text-[9px] font-bold text-white px-2 py-0.5 rounded-full">${displayStatus}</span><span class="text-[10px] text-gray-400 font-bold">${match.stadium}</span></div>`;
                                scoreHtml = `<span class="text-sm font-black ${live.awayScore > live.homeScore ? 'text-point' : 'text-white'}">${live.awayScore}</span><span class="text-xs text-gray-500 mx-1">:</span><span class="text-sm font-black ${live.homeScore > live.awayScore ? 'text-point' : 'text-white'}">${live.homeScore}</span>`;
                            }

                            return `
                                <div class="bg-white/5 border border-white/5 rounded-xl p-3 flex justify-between items-center cursor-pointer active:scale-95 transition-transform" onclick="openLineupPopup(${match.id})">
                                    <div class="flex flex-col gap-1 w-full">
                                        ${statusHtml}
                                        <div class="flex items-center justify-between mt-1">
                                            <div class="flex items-center gap-1.5 w-[40%]">${logo1}<span class="text-sm font-bold text-white truncate">${match.team1}</span></div>
                                            <div class="flex items-center justify-center w-[20%]">${scoreHtml}</div>
                                            <div class="flex items-center justify-end gap-1.5 w-[40%]"><span class="text-sm font-bold text-white truncate">${match.team2}</span>${logo2}</div>
                                        </div>
                                    </div>
                                </div>`;
                        }).join('') + `</div>`;

                        grid.innerHTML += `
                            <div class="flex flex-col gap-3 scroll-mt-28" ${currentDay.dateStr === todayStr ? 'id="weekly-today-group"' : ''}>
                                <div class="flex items-center gap-2">
                                    <h3 class="text-lg font-bold ${currentDay.dateStr === todayStr ? 'text-point' : 'text-white'}">${currentDay.d.getMonth() + 1}월 ${currentDay.d.getDate()}일 일정</h3>
                                    <span class="text-[10px] font-bold text-point bg-point-sub px-2 py-0.5 rounded-full">${currentDay.matches.length}경기</span>
                                </div>
                                ${matchesHtml}
                            </div>`;
                        idx++;
                    } else {
                        let startIdx = idx;
                        while (idx < 7 && weekDays[idx].matches.length === 0) idx++;
                        let endIdx = idx - 1;
                        let startDay = weekDays[startIdx];
                        let endDay = weekDays[endIdx];
                        let isTodayInRange = false;
                        for (let k = startIdx; k <= endIdx; k++) {
                            if (weekDays[k].dateStr === todayStr) isTodayInRange = true;
                        }
                        let titleColor = isTodayInRange ? 'text-point' : 'text-white';
                        let titleHtml = startIdx === endIdx
                            ? `<h3 class="text-lg font-bold ${titleColor}">${startDay.d.getMonth() + 1}월 ${startDay.d.getDate()}일</h3>`
                            : `<h3 class="text-lg font-bold ${titleColor}">${startDay.d.getMonth() + 1}월 ${startDay.d.getDate()}일 ~ ${endDay.d.getMonth() + 1}월 ${endDay.d.getDate()}일</h3>`;

                        grid.innerHTML += `
                            <div class="flex flex-col gap-3 scroll-mt-28" ${isTodayInRange ? 'id="weekly-today-group"' : ''}>
                                <div class="flex items-center gap-2">
                                    ${titleHtml}
                                    <span class="text-[10px] font-bold text-gray-400 bg-white/10 px-2 py-0.5 rounded-full border border-white/5">일정 없음</span>
                                </div>
                                <div class="text-[12px] text-gray-500 bg-white/5 rounded-xl p-5 text-center border border-white/5 flex flex-col items-center justify-center gap-2">

                                    이 기간에는 예정된 경기가 없습니다.
                                </div>
                            </div>`;
                    }
                }
            }
        }

        function openDateSheet(dateStr) {
            let matches = scheduleData.filter(m => m.date === dateStr && (selectedTeam === 'all' || m.team1 === selectedTeam || m.team2 === selectedTeam));
            const sheet = document.getElementById('bottom-sheet'); const container = document.getElementById('sheet-matches-container');
            const [y, m, d] = dateStr.split('-');
            document.getElementById('sheet-date-title').innerText = `${parseInt(m)}월 ${parseInt(d)}일 일정`;
            document.getElementById('sheet-match-count').innerText = matches.length > 0 ? `${matches.length}경기` : '일정 없음';
            container.innerHTML = '';

            if (matches.length === 0) {
                container.innerHTML = `<div class="flex flex-col items-center justify-center py-6 text-gray-500"><i class="fa-regular fa-calendar-xmark text-3xl mb-2"></i><p class="text-sm">이 날은 예정된 경기가 없습니다.</p></div>`;
            } else {
                matches.forEach(match => {
                    const live = liveDataStore[match.id]; 
                    let statusHtml = `<span class="text-[10px] text-gray-400 font-bold"><i class="fa-solid fa-clock mr-1"></i>${match.time}</span>`;
                    
                    if (live && live.gameStatus !== '경기전') {
                        let badgeClass = live.gameStatus === '종료' ? 'bg-gray-600' : 'bg-red-600 live-badge';
                        let displayStatus = (live.gameStatus === '경기중' && live.inning) ? live.inning : live.gameStatus;
                        statusHtml = `<div class="flex items-center gap-1.5"><span class="${badgeClass} text-[9px] font-bold text-white px-2 py-0.5 rounded-full">${displayStatus}</span><span class="text-[10px] text-gray-400 font-bold">${live.awayScore}:${live.homeScore}</span></div>`;
                    }

                    let logo1 = teamLogos[match.team1] ? `<img src="${teamLogos[match.team1]}" class="w-6 h-6 object-contain">` : `<div class="w-6 h-6 rounded-full ${teamColors[match.team1] || 'bg-gray-600'} flex items-center justify-center text-white text-[10px] font-bold">${match.team1.substring(0,1)}</div>`;
                    let logo2 = teamLogos[match.team2] ? `<img src="${teamLogos[match.team2]}" class="w-6 h-6 object-contain">` : `<div class="w-6 h-6 rounded-full ${teamColors[match.team2] || 'bg-gray-600'} flex items-center justify-center text-white text-[10px] font-bold">${match.team2.substring(0,1)}</div>`;

                    container.innerHTML += `
                        <div class="bg-white/5 border border-white/5 rounded-xl p-3 flex justify-between items-center cursor-pointer active:scale-95 transition-transform" onclick="openLineupPopup(${match.id})">
                            <div class="flex flex-col gap-1">
                                ${statusHtml}
                                <div class="flex items-center gap-2 mt-0.5">
                                    <div class="flex items-center gap-1.5">${logo1}<span class="text-sm font-bold text-white">${match.team1}</span></div>
                                    <span class="text-[11px] text-gray-500 font-bold">vs</span>
                                    <div class="flex items-center gap-1.5"><span class="text-sm font-bold text-white">${match.team2}</span>${logo2}</div>
                                </div>
                            </div>
                            <button class="w-8 h-8 rounded-full bg-white/5 text-gray-400 hover:text-white flex items-center justify-center text-xs shrink-0"><i class="fa-solid fa-chevron-right"></i></button>
                        </div>`;
                });
            }
            sheet.classList.add('show');
        }

        function closeBottomSheet() { const sheet = document.getElementById('bottom-sheet'); if (sheet) sheet.classList.remove('show'); }

        function renderRanking() {
            const container = document.getElementById('ranking-container');
            if (!container) return;

            // 🔥 공동 순위 계산 로직 (같은 순위가 2개 이상이면 T를 붙이기 위함) 🔥
            const rankCounts = {};
            rankingData.forEach(t => {
                if (t.rank !== '-') {
                    rankCounts[t.rank] = (rankCounts[t.rank] || 0) + 1;
                }
            });

            let html = `
                <div class="px-2 sm:px-4">
                    <!-- 🔥 pr-[84px]로 우측 여백을 확실히 늘려서 '연속' 글씨가 로고 박스에 먹히지 않게 완벽 방어 🔥 -->
                    <div class="flex items-center py-2 px-1 border-b border-white/20 mb-2 pr-[84px]">
                        <div class="w-[28px] text-center text-[11px] font-bold text-gray-400 shrink-0">순위</div>
                        <div class="w-[38px] text-center text-[11px] font-bold text-gray-400 shrink-0">팀명</div>
                        <!-- 🔥 각 항목의 폭(width)을 2~4px씩 미세하게 줄여서 넓었던 간격을 오밀조밀하게 좁힘 🔥 -->
                        <div class="flex-1 flex justify-between items-center px-0.5">
                            <div class="w-[18px] text-center text-[10px] font-bold text-gray-400 tracking-tighter whitespace-nowrap">경기</div>
                            <div class="w-[14px] text-center text-[10px] font-bold text-gray-400 whitespace-nowrap">승</div>
                            <div class="w-[14px] text-center text-[10px] font-bold text-gray-400 whitespace-nowrap">무</div>
                            <div class="w-[14px] text-center text-[10px] font-bold text-gray-400 whitespace-nowrap">패</div>
                            <div class="w-[28px] text-center text-[10px] font-bold text-gray-400 whitespace-nowrap">승률</div>
                            <div class="w-[30px] text-center text-[10px] font-bold text-gray-400 whitespace-nowrap">게임차</div>
                            <div class="w-[26px] text-center text-[10px] font-bold text-gray-400 whitespace-nowrap">연속</div>
                        </div>
                    </div>
                    <div class="flex flex-col gap-[5px] pb-2">`;

            rankingData.forEach((team, i) => {
                let rClass = team.rank === '-' ? 'text-gray-400' : (String(team.rank).replace('T','') === '1' ? 'text-[#e11d48]' : 'text-[#1a1a1a]');
                
                // 🔥 T 추가 로직 (랭크가 여러 개면 앞에 T 붙임) 🔥
                let displayRank = team.rank;
                if (team.rank !== '-' && !String(team.rank).includes('T') && rankCounts[team.rank] > 1) {
                    displayRank = 'T' + team.rank;
                }

                let gamesPlayed = team.w + (team.d || 0) + team.l;
                let hex = teamHex[team.team] || '#888888';
                
                // 🔥 연속(Streak) 자동 계산 로직 (파이어베이스 게임 결과 역추적) 🔥
                let teamMatches = scheduleData.filter(m => (m.team1 === team.team || m.team2 === team.team) && liveDataStore[m.id] && liveDataStore[m.id].gameStatus === '종료')
                                              .sort((a, b) => b.date.localeCompare(a.date) || (b.time||"00:00").localeCompare(a.time||"00:00"));
                
                let streakStr = '-';
                if (teamMatches.length > 0) {
                    let sType = ''; let sCount = 0;
                    for (let m of teamMatches) {
                        let l = liveDataStore[m.id];
                        let away = Number(l.awayScore || 0); let home = Number(l.homeScore || 0);
                        let isWin = (m.team1 === team.team && away > home) || (m.team2 === team.team && home > away);
                        let isLoss = (m.team1 === team.team && away < home) || (m.team2 === team.team && home < away);
                        let res = isWin ? '승' : (isLoss ? '패' : '무');
                        
                        if (!sType) { sType = res; sCount = 1; }
                        else if (sType === res) { sCount++; }
                        else break;
                    }
                    streakStr = sCount + sType;
                } else if (team.streak && team.streak !== '-') {
                    streakStr = String(team.streak);
                }

                let streakColor = streakStr.includes('승') ? 'text-[#e11d48]' : (streakStr.includes('패') ? 'text-[#074CA1]' : 'text-gray-500');

                html += `
                    <!-- 🔥 옥에 티였던 흰색/회색 테두리(border) 완전히 제거하여 로고 박스가 상하 끝까지 꽉 차도록 수정 🔥 -->
                    <div class="flex items-center bg-white h-[38px] rounded-[4px] shadow-sm relative overflow-hidden">
                        
                        <!-- Content Container (팀명은 왼쪽, 로고 공간 확보를 위해 pr-[84px] 적용) -->
                        <div class="relative z-10 flex items-center w-full pr-[84px]">
                            <!-- Rank -->
                            <div class="w-[28px] text-center text-[15px] font-black ${rClass} shrink-0 tracking-tighter">${displayRank}</div>
                            <!-- Team Name (사진처럼 팀 컬러 텍스트 적용) -->
                            <div class="w-[38px] text-center text-[14px] font-black shrink-0 tracking-tighter" style="color: ${hex}">${team.team}</div>
                            
                            <!-- Stats (폭을 줄여서 오밀조밀하게 맞추고, '연속' 글씨 자리 완벽 확보) -->
                            <div class="flex-1 flex justify-between items-center px-0.5 text-black text-[12px] font-bold tracking-tighter">
                                <div class="w-[18px] text-center text-gray-800 whitespace-nowrap">${gamesPlayed}</div>
                                <div class="w-[14px] text-center text-gray-800 whitespace-nowrap">${team.w}</div>
                                <div class="w-[14px] text-center text-gray-800 whitespace-nowrap">${team.d || 0}</div>
                                <div class="w-[14px] text-center text-gray-800 whitespace-nowrap">${team.l}</div>
                                <div class="w-[28px] text-center text-gray-600 font-black tracking-tight whitespace-nowrap">${team.winRate}</div>
                                <div class="w-[30px] text-center text-gray-500 whitespace-nowrap">${team.gb}</div>
                                <div class="w-[26px] text-center ${streakColor} whitespace-nowrap font-extrabold">${streakStr}</div>
                            </div>
                        </div>
                        
                        <!-- 🔥 Far Right Slanted Logo Area (그림자 더 깊고 진하게 강화) 🔥 -->
                        <div class="absolute top-0 bottom-0 -right-[2px] w-[90px] z-0" style="filter: drop-shadow(-5px 0 8px rgba(0,0,0,0.6));">
                            <!-- Slanted Background (상하 반전 완벽 적용: \ 모양으로 수정) -->
                            <div class="absolute inset-0" style="background-color: ${hex}; clip-path: polygon(0 0, 100% 0, 100% 100%, 18px 100%);">
                                <div class="absolute inset-0 bg-gradient-to-r from-black/20 to-transparent"></div>
                            </div>
                            <!-- Centered Logo inside the slanted box (로고도 살짝 키우고, 기아/KT 위치 재조정) -->
                            <div class="absolute inset-0 flex items-center justify-center pl-2">
                                <img src="${teamLogos[team.team]}" class="w-[50px] h-[50px] object-contain scale-[1.2] drop-shadow-md ${team.team === 'KIA' ? 'translate-y-[5px]' : ''} ${team.team === 'KT' ? '-translate-y-[2px]' : ''}">
                            </div>
                        </div>
                    </div>`;
            });
            html += `</div></div>`;
            container.innerHTML = html;
        }

        // 🔥 배너 로직 완벽 복구 🔥
        let currentBanner = 0;
        let totalBanners = 1;
        let bannerInterval;
        let isPlaying = true;

        function updateBannerDots(index) {
            const dots = document.querySelectorAll('.banner-dot');
            dots.forEach((dot, i) => {
                if (i === index) {
                    dot.classList.remove('w-1.5', 'bg-gray-500');
                    dot.classList.add('w-3', 'bg-white');
                } else {
                    dot.classList.remove('w-3', 'bg-white');
                    dot.classList.add('w-1.5', 'bg-gray-500');
                }
            });
        }

        function startBannerAutoScroll() {
            clearInterval(bannerInterval);
            if (!isPlaying || totalBanners <= 1) return;
            const carousel = document.getElementById('banner-carousel');
            bannerInterval = setInterval(() => {
                if(!carousel) return;
                currentBanner = (currentBanner + 1) % totalBanners;
                carousel.scrollTo({ left: currentBanner * carousel.clientWidth, behavior: 'smooth' });
                updateBannerDots(currentBanner);
            }, 3000);
        }

        function toggleBannerPlay() {
            isPlaying = !isPlaying;
            const icon = document.querySelector('#btn-banner-play i');
            if (icon) {
                if (isPlaying) {
                    icon.className = 'fa-solid fa-pause text-[10px]';
                    startBannerAutoScroll();
                } else {
                    icon.className = 'fa-solid fa-play text-[10px] ml-[1px]';
                    clearInterval(bannerInterval);
                }
            }
        }

        function renderBanners() {
            const carousel = document.getElementById('banner-carousel');
            if(!carousel) return;
            carousel.innerHTML = '';

            const now = new Date();
            let validMatches = scheduleData.filter(match => {
                if (selectedTeam !== 'all' && match.team1 !== selectedTeam && match.team2 !== selectedTeam) return false;
                
                const live = liveDataStore[match.id];
                if (live && live.gameStatus === '종료') return false;

                const matchStart = new Date(`${match.date}T${match.time}:00`);
                if (live && live.gameStatus === '경기중') return true;
                
                const matchEnd = new Date(matchStart.getTime() + 5 * 60 * 60 * 1000);
                return now < matchEnd;
            });

            validMatches.sort((a, b) => {
                if (a.date === b.date) return (a.time || "00:00").localeCompare(b.time || "00:00");
                return a.date.localeCompare(b.date);
            });

            let topMatches = [];
            let seenTeams = new Set();
            let targetDate = validMatches.length > 0 ? validMatches[0].date : null;

            for (let match of validMatches) {
                if (targetDate && match.date !== targetDate) continue;

                if (selectedTeam === 'all') {
                    if (!seenTeams.has(match.team1) && !seenTeams.has(match.team2)) {
                        topMatches.push(match);
                        seenTeams.add(match.team1);
                        seenTeams.add(match.team2);
                    }
                    if (topMatches.length >= 5) break; 
                } else {
                    if (topMatches.length > 0) {
                        let firstLive = liveDataStore[topMatches[0].id];
                        if (firstLive && firstLive.gameStatus === '경기중') break;
                    }
                    topMatches.push(match);
                    if (topMatches.length >= 3) break;
                }
            }

            topMatches.forEach(match => {
                const hex1 = teamHex[match.team1] || '#888888';
                const hex2 = teamHex[match.team2] || '#888888';
                const d = new Date(match.date);
                const days = ['일', '월', '화', '수', '목', '금', '토'];
                const dateStr = `${d.getMonth()+1}. ${d.getDate()} (${days[d.getDay()]}) ${match.time}`;

                const live = liveDataStore[match.id];
                
                let centerHtml = `<span class="text-[11px] font-black text-gray-300 tracking-wider">VS</span>`;
                if (live && live.gameStatus === '경기중') {
                    let displayStatus = live.inning ? live.inning : '경기중';
                    centerHtml = `
                        <div class="flex items-center justify-center w-full relative">
                            <span class="absolute -top-6 text-[10px] font-bold text-white bg-red-600 px-2.5 py-0.5 rounded-full live-badge tracking-widest whitespace-nowrap">${displayStatus}</span>
                            <div class="flex items-center justify-center w-full">
                                <div class="flex-1 flex justify-end"><span class="text-3xl font-black ${live.awayScore > live.homeScore ? 'text-point' : 'text-white'} leading-none">${live.awayScore}</span></div>
                                <div class="px-1.5 flex justify-center items-center pb-0.5"><span class="text-base text-gray-500 font-bold leading-none">:</span></div>
                                <div class="flex-1 flex justify-start"><span class="text-3xl font-black ${live.homeScore > live.awayScore ? 'text-point' : 'text-white'} leading-none">${live.homeScore}</span></div>
                            </div>
                        </div>
                    `;
                }

                const div = document.createElement('div');
                div.className = 'min-w-full bg-[#18181b] border-y border-white/5 shrink-0 px-7 py-5 transition-transform active:scale-[0.98] snap-center relative overflow-hidden shadow-lg';
                div.innerHTML = `
                    <div class="absolute inset-0 pointer-events-none z-0" style="background: linear-gradient(135deg, ${hex1}80 0%, ${hex2}80 100%); opacity: 0.85;"></div>
                    <div class="flex justify-between items-center mb-5 relative z-10">
                        <div class="flex items-center gap-1.5">
                            <div class="w-1 h-3 rounded-sm" style="background-color: ${hex2}"></div>
                            <span class="text-[11px] font-extrabold text-white tracking-wider">${match.stadium}</span>
                        </div>
                        <span class="text-[10px] text-gray-300 font-medium bg-white/5 px-2 py-0.5 rounded-lg border border-white/5 tracking-wide">${dateStr}</span>
                    </div>
                    <div class="flex justify-between items-center relative z-10">
                        <div class="flex items-center gap-3 w-[40%]">
                            <img src="${teamLogos[match.team1]}" class="w-[42px] h-[42px] object-contain drop-shadow-md">
                            <div class="flex flex-col">
                                <span class="text-[9px] text-gray-300 font-bold mb-0.5 tracking-wider">AWAY</span>
                                <span class="text-[15px] font-bold text-white tracking-wide">${match.team1}</span>
                            </div>
                        </div>
                        <div class="flex justify-center w-[20%]">
                            ${centerHtml}
                        </div>
                        <div class="flex items-center justify-end gap-3 w-[40%] text-right">
                            <div class="flex flex-col">
                                <span class="text-[9px] text-gray-300 font-bold mb-0.5 tracking-wider">HOME</span>
                                <span class="text-[15px] font-bold text-white tracking-wide">${match.team2}</span>
                            </div>
                            <img src="${teamLogos[match.team2]}" class="w-[42px] h-[42px] object-contain drop-shadow-md">
                        </div>
                    </div>`;
                carousel.appendChild(div);
            });

            totalBanners = carousel.children.length;
            const dotsContainer = document.getElementById('banner-dots-container');
            const playBtn = document.getElementById('btn-banner-play');

            if(dotsContainer) {
                dotsContainer.innerHTML = '';
                for(let i=0; i<totalBanners; i++) {
                    const dot = document.createElement('div');
                    dot.className = `banner-dot w-${i===currentBanner?'3':'1.5'} h-1.5 rounded-full ${i===currentBanner?'bg-white':'bg-gray-500'} transition-all duration-300`;
                    dotsContainer.appendChild(dot);
                }
            }

            if (playBtn) {
                if (totalBanners > 1) {
                    playBtn.classList.remove('hidden');
                } else {
                    playBtn.classList.add('hidden');
                }
            }
            
            if (currentBanner >= totalBanners) currentBanner = 0;
            updateBannerDots(currentBanner);
            startBannerAutoScroll();
        }

        function navigateCalendar(offset) { 
            if (viewMode === 'week') {
                currentDate.setDate(currentDate.getDate() + (offset * 7)); // 주간 모드일 때는 정확히 7일씩 이동
            } else {
                currentDate.setDate(1); 
                currentDate.setMonth(currentDate.getMonth() + offset); // 월간 모드일 때는 1개월씩 이동
            }
            renderCalendar(); 
            closeBottomSheet(); 
        }

        // 🔥 매치 센터 (라인업 & 실시간 점수 상세 팝업) 🔥
        function openLineupPopup(matchId) {
            currentPopupMatchId = matchId; 
            if (navigator.vibrate) navigator.vibrate(5);
            const popup = document.getElementById('lineup-popup');
            const bg = document.getElementById('lineup-popup-bg');
            const sheet = document.getElementById('lineup-popup-sheet');
            
            popup.classList.remove('hidden'); popup.classList.add('flex');
            setTimeout(() => { bg.classList.remove('opacity-0', 'pointer-events-none'); bg.classList.add('opacity-100', 'pointer-events-auto'); sheet.classList.remove('translate-y-full'); }, 10);

            renderPopupContent(matchId);
        }

        function renderPopupContent(matchId) {
            const content = document.getElementById('lineup-content');
            const match = scheduleData.find(m => m.id === parseInt(matchId) || m.id === matchId);
            if (!match) return;

            const live = liveDataStore[matchId];

            const logo1 = teamLogos[match.team1] ? `<img src="${teamLogos[match.team1]}" class="w-14 h-14 object-contain drop-shadow-lg mb-2">` : `<div class="w-14 h-14 rounded-full ${teamColors[match.team1]} flex items-center justify-center text-white font-bold mb-2">${match.team1}</div>`;
            const logo2 = teamLogos[match.team2] ? `<img src="${teamLogos[match.team2]}" class="w-14 h-14 object-contain drop-shadow-lg mb-2">` : `<div class="w-14 h-14 rounded-full ${teamColors[match.team2]} flex items-center justify-center text-white font-bold mb-2">${match.team2}</div>`;

            if (!live) {
                content.innerHTML = `
                    <div class="flex justify-between items-center mb-8 px-2 mt-2">
                        <div class="flex flex-col items-center w-[40%]">${logo1}<span class="text-[15px] font-black text-white">${match.team1}</span></div>
                        <span class="text-2xl font-black text-gray-700">VS</span>
                        <div class="flex flex-col items-center w-[40%]">${logo2}<span class="text-[15px] font-black text-white">${match.team2}</span></div>
                    </div>
                    <div class="flex flex-col items-center justify-center h-48 text-gray-400 mt-4 gap-3 bg-white/5 rounded-2xl border border-white/5">
                        <i class="fa-solid fa-clipboard-question text-4xl text-gray-500 mb-2"></i>
                        <span class="text-lg font-bold text-white tracking-wide">라인업 미발표</span>
                        <span class="text-[12px] text-gray-500 text-center">선발 라인업은<br>경기 시작 1~2시간 전에 공개됩니다.</span>
                    </div>`;
                return;
            }

            let scoreCenterHtml = `<span class="text-2xl font-black text-gray-700">VS</span>`;
            if (live.gameStatus !== '경기전') {
                let displayStatus = (live.gameStatus === '경기중' && live.inning) ? live.inning : live.gameStatus;
                scoreCenterHtml = `
                    <div class="flex flex-col items-center gap-1">
                        <span class="text-[11px] font-bold text-white bg-red-600 px-2 py-0.5 rounded-full ${live.gameStatus !== '종료' ? 'live-badge' : 'bg-gray-600'}">${displayStatus}</span>
                        <div class="flex items-center gap-2 mt-2">
                            <span class="text-3xl font-black ${live.awayScore > live.homeScore ? 'text-point' : 'text-white'}">${live.awayScore}</span>
                            <span class="text-xl text-gray-500">:</span>
                            <span class="text-3xl font-black ${live.homeScore > live.awayScore ? 'text-point' : 'text-white'}">${live.homeScore}</span>
                        </div>
                    </div>`;
            }

            content.innerHTML = `
                <!-- 매치업 & 점수 -->
                <div class="flex justify-between items-center mb-8 px-2 mt-2">
                    <div class="flex flex-col items-center w-[30%]">
                        ${logo1}
                        <span class="text-[15px] font-black text-white tracking-wider">${match.team1}</span>
                        <span class="text-[10px] font-bold text-gray-500 tracking-widest mt-0.5">AWAY</span>
                    </div>
                    <div class="flex flex-col items-center justify-center w-[40%]">
                        ${scoreCenterHtml}
                    </div>
                    <div class="flex flex-col items-center w-[30%]">
                        ${logo2}
                        <span class="text-[15px] font-black text-white tracking-wider">${match.team2}</span>
                        <span class="text-[10px] font-bold text-gray-500 tracking-widest mt-0.5">HOME</span>
                    </div>

        // 🔥 HTML5 오디오 플레이어 로직 (MP3 로컬 파일용) 🔥
        let audioPlayer;
        let currentSongTitle = '';
        let currentSongCover = '';
        let currentPlaylist = [];
        let currentSongIndex = -1;

        // =========================================================================
        // 🔥 [안드로이드 앱 통신용 브릿지 코드 추가됨] 🔥
        // 앱(상단바 컨트롤러)에서 웹사이트의 음악을 제어하기 위해 추가된 함수들입니다.
        // =========================================================================
        
        // 1. 앱에서 [재생] 버튼을 눌렀을 때 실행됨
        window.appPlayMusic = function() {
            if (audioPlayer && audioPlayer.src) {
                audioPlayer.play();
                const btn = document.getElementById('mini-player-btn');
                if (btn) btn.className = 'fa-solid fa-pause text-base';
            }
        };

        // 2. 앱에서 [일시정지] 버튼을 눌렀을 때 실행됨
        window.appPauseMusic = function() {
            if (audioPlayer) {
                audioPlayer.pause();
                const btn = document.getElementById('mini-player-btn');
                if (btn) btn.className = 'fa-solid fa-play text-base ml-0.5';
            }
        };

        // 3. 웹에서 음악 상태가 변할 때 안드로이드(앱)로 상태를 보내줌
        function sendStateToAndroid(state, title) {
            // 안드로이드에 연결된 'AndroidBridge'가 있을 때만 메세지를 보냅니다.
            if (window.AndroidBridge && window.AndroidBridge.updateMusicState) {
                window.AndroidBridge.updateMusicState(state, title);
            }
        }

        // ⭐ 4. 앱에서 [이전 곡] 버튼을 눌렀을 때 실행됨
        window.appPrevMusic = function() {
            if (currentPlaylist.length > 0 && currentSongIndex >= 0) {
                currentSongIndex--;
                if (currentSongIndex < 0) {
                    currentSongIndex = currentPlaylist.length - 1; // 처음이면 맨 마지막 곡으로
                }
                const prevSong = currentPlaylist[currentSongIndex];
                executePlay(prevSong.url, prevSong.title);
            } else {
                // 재생 목록이 없으면 처음부터 다시 재생
                if (audioPlayer && audioPlayer.src) {
                    audioPlayer.currentTime = 0;
                    audioPlayer.play();
                }
            }
        };

        // ⭐ 5. 앱에서 [다음 곡] 버튼을 눌렀을 때 실행됨
        window.appNextMusic = function() {
            if (currentPlaylist.length > 0 && currentSongIndex >= 0) {
                currentSongIndex++;
                if (currentSongIndex >= currentPlaylist.length) {
                    currentSongIndex = 0; // 마지막이면 맨 처음 곡으로
                }
                const nextSong = currentPlaylist[currentSongIndex];
                executePlay(nextSong.url, nextSong.title);
            }
        };
        // =========================================================================

        function initAudioPlayer() {
            audioPlayer = document.getElementById('audio-player');
            
            audioPlayer.addEventListener('play', () => {
                const btn = document.getElementById('mini-player-btn');
                if (btn) btn.className = 'fa-solid fa-pause text-base';
                updateMediaSession();
                
                // 앱 상단바에 "나 지금 노래 재생 중이야!" 라고 알려줌
                sendStateToAndroid("PLAYING", currentSongTitle);
            });
            
            audioPlayer.addEventListener('pause', () => {
                const btn = document.getElementById('mini-player-btn');
                if (btn) btn.className = 'fa-solid fa-play text-base ml-0.5';
                
                // 앱 상단바에 "나 지금 노래 일시정지했어!" 라고 알려줌
                sendStateToAndroid("PAUSED", currentSongTitle);
            });
            
            audioPlayer.addEventListener('timeupdate', () => {
                if(audioPlayer.duration) {
                    const percent = (audioPlayer.currentTime / audioPlayer.duration) * 100;
                    document.getElementById('mini-player-progress').style.width = percent + '%';
                }
            });
            
            audioPlayer.addEventListener('ended', () => {
                if (currentPlaylist.length > 0 && currentSongIndex >= 0 && currentSongIndex + 1 < currentPlaylist.length) {
                    // 리스트에 다음 곡이 있으면 자동으로 재생
                    currentSongIndex++;
                    const nextSong = currentPlaylist[currentSongIndex];
                    executePlay(nextSong.url, nextSong.title);
                } else {
                    // 모든 곡을 재생했거나 단일 곡일 경우 정지 처리
                    const btn = document.getElementById('mini-player-btn');
                    if (btn) btn.className = 'fa-solid fa-play text-base ml-0.5';
                    document.getElementById('mini-player-progress').style.width = '0%';
                    sendStateToAndroid("PAUSED", currentSongTitle);
                }
            });
            
            audioPlayer.addEventListener('error', () => {
                showToast('음원 파일을 불러올 수 없습니다. 경로를 확인해주세요.');
                closeMiniPlayer();
            });
        }

        function updateMediaSession() {
            if ('mediaSession' in navigator && currentSongTitle) {
                let artistName = '팀 응원가';
                if (currentSongTitle.includes('김도영') || currentSongTitle.includes('구자욱') || currentSongTitle.includes('최형우')) {
                    artistName = '선수 응원가';
                }

                navigator.mediaSession.metadata = new MediaMetadata({
                    title: currentSongTitle,
                    artist: artistName,
                    artwork: [
                        { src: currentSongCover, sizes: '512x512', type: 'image/png' },
                        { src: currentSongCover, sizes: '192x192', type: 'image/png' }
                    ]
                });

                navigator.mediaSession.setActionHandler('play', () => { if(audioPlayer) audioPlayer.play(); });
                navigator.mediaSession.setActionHandler('pause', () => { if(audioPlayer) audioPlayer.pause(); });
                // ⭐ 추가됨: 잠금화면이나 이어폰에서 다음/이전 버튼 눌렀을 때도 동작하게 만듦
                navigator.mediaSession.setActionHandler('previoustrack', () => { window.appPrevMusic(); });
                navigator.mediaSession.setActionHandler('nexttrack', () => { window.appNextMusic(); });
            }
        }

        function toggleMiniPlayerPlay() {
            if(!audioPlayer) return;
            if (audioPlayer.paused) {
                audioPlayer.play();
            } else {
                audioPlayer.pause();
            }
        }

        function closeMiniPlayer() {
            if(audioPlayer) {
                audioPlayer.pause();
                audioPlayer.currentTime = 0;
            }
            const playerUI = document.getElementById('mini-player');
            playerUI.classList.add('translate-y-[150%]', 'opacity-0', 'pointer-events-none');
            const progressBar = document.getElementById('mini-player-progress');
            if(progressBar) progressBar.style.width = '0%';
        }

        // 전체 재생 버튼 로직
        function playAllSongs(containerId) {
            const container = document.getElementById(containerId);
            if (!container) return;
            
            const songElements = container.querySelectorAll(`[onclick*="playCheerSong"]`);
            currentPlaylist = Array.from(songElements).map(el => {
                const onclickStr = el.getAttribute('onclick');
                const match = onclickStr.match(/playCheerSong\(['"]([^'"]+)['"],\s*['"]([^'"]+)['"]\)/);
                if (match) return { url: match[1], title: match[2] };
                return null;
            }).filter(item => item !== null);

            if (currentPlaylist.length > 0) {
                currentSongIndex = 0;
                executePlay(currentPlaylist[0].url, currentPlaylist[0].title);
            } else {
                showToast('재생할 곡이 없습니다.');
            }
        }

        // 현재 활성화된 탭의 곡들 전체 재생 (상단 알약 버튼용)
        function playActiveTabSongs(teamPrefix) {
            const activeContainer = document.querySelector(`div[id^="content-cheer-${teamPrefix}-"]:not(.hidden)`);
            if (activeContainer) {
                playAllSongs(activeContainer.id);
            } else {
                showToast('재생할 곡이 없습니다.');
            }
        }

        // 개별 곡 재생 시 주변 목록 스캔하여 자동 재생 준비
        function playCheerSong(url, title) {
            const allSongElements = document.querySelectorAll(`[onclick*="playCheerSong"]`);
            
            // 🔥 현재 화면에 '보이는(숨겨지지 않은)' 탭에 있는 요소를 우선적으로 찾도록 똑똑하게 수정 🔥
            let clickedElement = Array.from(allSongElements).find(el => {
                const isMatch = el.getAttribute('onclick').includes(`'${url}'`) || el.getAttribute('onclick').includes(`"${url}"`);
                if (!isMatch) return false;
                const parent = el.closest('[id^="content-cheer-"]');
                return parent && !parent.classList.contains('hidden'); // hidden이 없는(켜져 있는) 탭인지 확인
            });

            // 만약 못 찾았다면 기존 방식(첫 번째 요소)으로 폴백
            if (!clickedElement) {
                clickedElement = Array.from(allSongElements).find(el => el.getAttribute('onclick').includes(`'${url}'`) || el.getAttribute('onclick').includes(`"${url}"`));
            }
            
            if (clickedElement) {
                const parentContainer = clickedElement.closest('[id^="content-cheer-"]');
                if (parentContainer) {
                    const siblingElements = parentContainer.querySelectorAll(`[onclick*="playCheerSong"]`);
                    currentPlaylist = Array.from(siblingElements).map(el => {
                        const onclickStr = el.getAttribute('onclick');
                        const match = onclickStr.match(/playCheerSong\(['"]([^'"]+)['"],\s*['"]([^'"]+)['"]\)/);
                        if (match) return { url: match[1], title: match[2] };
                        return null;
                    }).filter(item => item !== null);
                    
                    currentSongIndex = currentPlaylist.findIndex(item => item.url === url);
                }
            } else {
                currentPlaylist = [{url, title}];
                currentSongIndex = 0;
            }

            executePlay(url, title);
        }

        // 실제 음악 실행 엔진
        function executePlay(url, title) {
            if (!audioPlayer) initAudioPlayer();

            audioPlayer.autoplay = true; // 🔥 스마트폰이 백그라운드에서 자동재생 권한을 뺏지 못하도록 강제 부여
            audioPlayer.src = url;
            audioPlayer.load(); // 🔥 화면이 꺼져 있어도 다음 곡 파일을 즉시 다운로드하라고 강제 명령
            audioPlayer.play().catch(e => {
                showToast('음원 재생 중 오류가 발생했습니다. (파일 확인 필요)');
            });
            
            showToast(`🎵 ${title} 재생을 시작합니다.`);

            // 🔥 잠금화면 호환용 로컬 PNG 표지 세팅 🔥
            let coverUrl = 'kia/kia_logo.png';
            let displayCoverUrl = teamLogos['KIA'];
            
            if (title.includes('삼성') || title.includes('엘도라도') || title.includes('구자욱') || title.includes('최형우')) {
                coverUrl = 'samsung/samsung_logo.png';
                displayCoverUrl = teamLogos['삼성'];
            }

            document.getElementById('mini-player-title').innerText = title;
            document.getElementById('mini-player-cover').src = displayCoverUrl;
            
            currentSongTitle = title;
            currentSongCover = coverUrl;
            updateMediaSession();
            
            const progressBar = document.getElementById('mini-player-progress');
            if(progressBar) progressBar.style.width = '0%';
            
            const playerUI = document.getElementById('mini-player');
            playerUI.classList.remove('translate-y-[150%]', 'opacity-0', 'pointer-events-none');
        }

        // 앱 구동 시작점!
        window.onload = async () => {
            initAudioPlayer(); // 오디오 플레이어 초기화
            renderCheerSongs(); // 🔥 응원가 리스트 렌더링 🔥
            await syncWithFirestore(); 
            setTeamFilter(selectedTeam);
            switchTab(0);
            renderBanners(); 

            const bannerCarousel = document.getElementById('banner-carousel');
            if (bannerCarousel) {
                bannerCarousel.addEventListener('scroll', () => {
                    const scrollPos = bannerCarousel.scrollLeft;
                    const width = bannerCarousel.clientWidth;
                    if (width === 0) return;
                    const newIndex = Math.round(scrollPos / width);
                    if (newIndex !== currentBanner) {
                        currentBanner = newIndex;
                        updateBannerDots(currentBanner);
                    }
                });
                bannerCarousel.addEventListener('touchstart', () => clearInterval(bannerInterval), {passive: true});
                bannerCarousel.addEventListener('touchend', () => { if (isPlaying) startBannerAutoScroll(); }, {passive: true});
            }
        };
    </script>
</body>
</html>
